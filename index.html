<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Show Experience</title>
    <style>
        body {
            margin: 0; overflow: hidden; background: #000;
            color: #fff; font-family: 'Arial Black', sans-serif;
            height: 100vh; perspective: 1000px;
        }

        #ui {
            position: absolute; top: 0; width: 100%; z-index: 9999;
            background: rgba(0,0,0,0.85); padding: 15px; text-align: center;
            border-bottom: 2px solid #39ff14;
        }

        /* TEXTO CENTRAL (LETRA) */
        #lyrics-box {
            position: absolute; width: 100%; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; font-size: 3rem; font-weight: 900;
            color: #fff; text-shadow: 0 0 20px #00f3ff, 0 0 40px #00f3ff;
            z-index: 500; pointer-events: none;
            text-transform: uppercase;
        }

        /* PALABRAS QUE CAEN */
        .falling-word {
            position: absolute; top: -100px; font-size: 2.2rem;
            font-weight: 900; color: #fff;
            text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
            animation: fallDown 4s linear forwards; z-index: 100;
        }

        /* CORAZÓN 3D */
        #heart-3d {
            position: absolute; top: 50%; left: 50%; font-size: 15rem;
            transform: translate(-50%, -50%); display: none;
            z-index: 9000; filter: drop-shadow(0 0 50px #ff0000);
            animation: spin3d 2s infinite linear;
        }

        /* EXPLOSIONES */
        .particle {
            position: absolute; font-size: 2.5rem;
            animation: blast 1.5s ease-out forwards; z-index: 200;
        }

        @keyframes fallDown { to { transform: translateY(115vh) rotateX(360deg); } }
        @keyframes spin3d { from { transform: translate(-50%, -50%) rotateY(0); } to { transform: translate(-50%, -50%) rotateY(360deg); } }
        @keyframes blast {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(2); opacity: 0; }
        }

        button { background: #39ff14; color: #000; padding: 15px 30px; border: none; font-weight: bold; border-radius: 50px; font-size: 1.1rem; cursor: pointer; box-shadow: 0 0 15px #39ff14; }
    </style>
</head>
<body>

    <div id="ui">
        <input type="file" id="music-file" accept="audio/*">
        <button id="btn-start" style="display:none;">INICIAR SHOW NEÓN</button>
    </div>

    <div id="lyrics-box"></div>
    <div id="heart-3d">❤️</div>

    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        const startBtn = document.getElementById('btn-start');
        const lyricsBox = document.getElementById('lyrics-box');
        const heart3d = document.getElementById('heart-3d');
        let explosionActive = false;

        document.getElementById('music-file').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                audio.src = URL.createObjectURL(file);
                startBtn.style.display = 'inline-block';
            }
        };

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.interimResults = true;

            startBtn.onclick = () => {
                recognition.start();
                audio.play();
                startBtn.innerText = "🎤 SHOW ACTIVO";
                startBtn.style.background = "#ff007f";
            };

            recognition.onresult = (event) => {
                let currentText = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    currentText = event.results[i][0].transcript.toLowerCase();
                    
                    // Mostrar letra en el centro (Tiempo Real)
                    lyricsBox.innerText = currentText;

                    if (event.results[i].isFinal) {
                        // Comandos
                        if (currentText.includes("explosión")) {
                            explosionActive = true;
                            startLoopExplosions();
                        }
                        if (currentText.includes("corazón 3d") || currentText.includes("grande")) {
                            heart3d.style.display = 'block';
                            setTimeout(() => heart3d.style.display = 'none', 5000);
                        }

                        // Lluvia de palabras
                        currentText.split(' ').forEach(w => {
                            if(w.length > 1) spawnFalling(w);
                        });

                        // Limpiar centro para la siguiente frase
                        setTimeout(() => { lyricsBox.innerText = ""; }, 1200);
                    }
                }
            };
            recognition.onend = () => recognition.start();
        }

        function spawnFalling(word) {
            const div = document.createElement('div');
            div.className = 'falling-word';
            div.innerText = word.toUpperCase();
            div.style.left = Math.random() * 80 + 10 + "vw";
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        function startLoopExplosions() {
            setInterval(() => {
                if(!explosionActive) return;
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                for(let i=0; i<10; i++){
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.innerText = ['❤️', '💖', '✨'][Math.floor(Math.random()*3)];
                    p.style.left = x + "px"; p.style.top = y + "px";
                    p.style.setProperty('--tx', (Math.random()-0.5)*400 + "px");
                    p.style.setProperty('--ty', (Math.random()-0.5)*400 + "px");
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 1500);
                }
            }, 700);
        }
    </script>
</body>
</html>
